services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trader_mini
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: trader
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d trader_mini"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://trader:trader@postgres:5432/trader_mini
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://frontend
      ENVIRONMENT: docker
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend

  parser:
    build:
      context: ./backend
    profiles:
      - jobs
    environment:
      DATABASE_URL: postgresql+psycopg://trader:trader@postgres:5432/trader_mini
      ENVIRONMENT: docker
    command: ["python", "-m", "app.jobs.parse_forexfactory", "--browser", "--impact", "HIGH"]
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
